<!-- public/offline.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelys - Sin conexión</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f8fafc; color: #1e293b; }
        .card { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { color: #4f46e5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Ups! Te quedaste sin internet</h1>
        <p>Zelys requiere una conexión activa para sincronizar tus datos con el servidor de forma segura.</p>
        <button onclick="window.location.reload()">Reintentar conexión</button>
    </div>
</body>
</html>
