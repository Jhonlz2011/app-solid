<!DOCTYPE html>
<html lang="es" >

<head>
  <script>
    // Synchronous fallback script for local development HMR and client failover
    (function() {
      if (!document.getElementById('tenant-branding')) {
        const host = window.location.hostname;
        let slug = null;
        const ipRegex = /^[0-9.]+$/;
        if (ipRegex.test(host) || host === 'localhost' || host === '127.0.0.1') {
          const params = new URLSearchParams(window.location.search);
          slug = params.get('slug');
        } else {
          const parts = host.split('.');
          if (host.includes('zelys.app')) {
            if (parts.length > 2 && parts[0] !== 'api' && parts[0] !== 'in' && parts[0] !== 'www') {
              slug = parts[0];
            }
          } else if (parts.length > 1 && parts[parts.length - 1] === 'localhost') {
            slug = parts[0];
          } else if (parts.length > 2) {
            slug = parts[0];
          }
        }

        if (slug) {
          try {
            const cached = localStorage.getItem('branding:' + slug);
            if (cached) {
              const company = JSON.parse(cached);
              const style = document.createElement('style');
              style.id = 'tenant-branding';
              
              const themePresets = {
                '#3b82f6': { bgLight: '#f4f7fb', bgDark: '#020617', surfaceLight: '#ffffff', surfaceDark: '#0f172a', cardAltLight: '#eef2ff', cardAltDark: '#1e293b', borderLight: '#e7eff8', borderDark: '#1f2533' },
                '#10b981': { bgLight: '#f0f7f4', bgDark: '#051c14', surfaceLight: '#ffffff', surfaceDark: '#0c2c20', cardAltLight: '#e2efe9', cardAltDark: '#112d24', borderLight: '#e2efe9', borderDark: '#183f31' },
                '#f59e0b': { bgLight: '#faf8f5', bgDark: '#1c1917', surfaceLight: '#ffffff', surfaceDark: '#292524', cardAltLight: '#f1ebe1', cardAltDark: '#383330', borderLight: '#f1ebe1', borderDark: '#44403c' },
                '#64748b': { bgLight: '#f1f5f9', bgDark: '#0f172a', surfaceLight: '#ffffff', surfaceDark: '#1e293b', cardAltLight: '#e2e8f0', cardAltDark: '#1f2937', borderLight: '#e2e8f0', borderDark: '#334155' }
              };
              
              const theme = themePresets[company.secondaryColor] || themePresets['#64748b'];
              
              const getContrastColor = function(hex) {
                const cleanHex = hex.replace('#', '');
                const r = parseInt(cleanHex.substring(0, 2), 16);
                const g = parseInt(cleanHex.substring(2, 4), 16);
                const b = parseInt(cleanHex.substring(4, 6), 16);
                const toLinear = function(c) {
                  const s = c / 255;
                  return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
                };
                const l = 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
                return l > 0.179 ? '#0f172a' : '#ffffff';
              };

              style.innerHTML = `
                :root {
                  --primary: ${company.primaryColor} !important;
                  --on-primary: ${getContrastColor(company.primaryColor)} !important;
                  --secondary: ${company.secondaryColor} !important;
                  --on-secondary: ${getContrastColor(company.secondaryColor)} !important;
                  --bg-light-val: ${theme.bgLight} !important;
                  --bg-dark-val: ${theme.bgDark} !important;
                  --surface-light-val: ${theme.surfaceLight} !important;
                  --surface-dark-val: ${theme.surfaceDark} !important;
                  --card-light-val: ${theme.surfaceLight} !important;
                  --card-dark-val: ${theme.surfaceDark} !important;
                  --card-alt-light-val: ${theme.cardAltLight} !important;
                  --card-alt-dark-val: ${theme.cardAltDark} !important;
                  --border-light-val: ${theme.borderLight} !important;
                  --border-dark-val: ${theme.borderDark} !important;
                }
              `;
              document.head.appendChild(style);
              document.title = (company.tradeName || company.businessName) + ' - Iniciar Sesión';
            }
          } catch(e) {
            console.error('Error in branding fallback:', e);
          }
        }
      }
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f4f7fb" media="(prefers-color-scheme: light)" />
<!-- Para tema oscuro -->
<meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
<meta name="color-scheme" content="light dark" />

  <link rel="preconnect" href="https://api.zelys.app" crossorigin />
  <link rel="dns-prefetch" href="https://api.zelys.app" />

  <link rel="icon" type="image/png" sizes="48x48" href="/icons/logo-blank-48x48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/logo-blank-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/logo-blank-512x512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/180.png" />
  <link rel="shortcut icon" href="/favicon.ico">
  <title>ERP - Sistema de Gestión</title>
</head>

<body>
  <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
  <div id="root"></div>
  <script src="/src/app.tsx" type="module"></script>
</body>

</html>
